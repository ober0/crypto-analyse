version: "3.9"

services:
    crypto-analyse-postgres:
        image: postgres:15
        container_name: crypto-analyse-postgres
        restart: always
        ports:
            - "5432:5432"
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        volumes:
            - pgdata:/var/lib/postgresql/data



volumes:
    pgdata:
