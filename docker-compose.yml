version: "3.9"

services:
    crypto-analyse-postgres:
        image: postgres:15
        container_name: crypto-analyse-postgres
        restart: always
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        volumes:
            - pgdata:/var/lib/postgresql/data
        ports:
            - 5432:5432


    crypto-analyse-backend:
        build: .
        container_name: crypto-analyse-backend
        restart: always
        depends_on:
            - crypto-analyse-postgres
        environment:
            NODE_ENV: production
            DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@crypto-analyse-postgres:5432/${POSTGRES_DB}?schema=public
        env_file:
            - .env
        ports:
            - "3000:3000"
        command: >
            sh -c "
                npm run reset
                npm run migrate:deploy
                npm run generate
                npm run seed:deploy
                npm run prod
            " 


volumes:
    pgdata:
